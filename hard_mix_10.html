<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="quizicon.png">
<meta name="theme-color" content="#f08c00">
    <title>🔥 고난도 혼합 (10문제)</title>
   
    <link rel="stylesheet" href="style.css">
</head>
<body class="mix-hard-page">

    <div class="header">
        <h1>🔥 고난도 혼합 (10문제)</h1>
        <p class="info">두 자리 수 전체 범위입니다.<br>회색 칸을 누르면 정답이 보여요!</p>
    </div>

    <div class="quiz-wrapper">
        <div class="card">
            <ul id="quiz-list"></ul>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-refresh" onclick="allNewQuizzes()">🔄 새로운 문제 만들기</button>
	<a href="index.html" class="btn-home">🏠 메인 화면으로 돌아가기</a>
    </div>

<script>
    function showAnswer(element) {
        element.classList.add('show');
    }

    function allNewQuizzes() {
        const quizList = document.getElementById('quiz-list');
        const data = [];

        while (data.length < 10) {
            const isPlus = Math.random() < 0.5;
            // 두 자리 수 전체 범위 (10 ~ 99)
            const n1 = Math.floor(Math.random() * 90) + 10;
            const n2 = Math.floor(Math.random() * 9) + 1;

            if (isPlus) {
                // 받아올림 조건: 일의 자리 합이 10 이상
                // 90대 숫자의 경우 세 자리 수가 될 수 있음 (예: 95 + 7 = 102)
                if ((n1 % 10) + n2 >= 10) {
                    const q = `${n1} + ${n2}`;
                    if (!data.some(i => i.q === q)) data.push({ q, a: n1 + n2 });
                }
            } else {
                // 받아내림 조건: 일의 자리 < 빼는 수
                if ((n1 % 10) < n2) {
                    const q = `${n1} - ${n2}`;
                    if (!data.some(i => i.q === q)) data.push({ q, a: n1 - n2 });
                }
            }
        }

        quizList.innerHTML = data.map((item, idx) => `
            <li>
                <span class="q-text"><span class="q-num">(${idx + 1})</span> 
            ${item.q} =</span> 
                <div class="ans-box" onclick="showAnswer(this)">${item.a}</div>
            </li>
        `).join('');

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    allNewQuizzes();
</script>

</body>
</html>
