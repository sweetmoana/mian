<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>왕기초 덧셈 도전!</title>
    <link rel="stylesheet" href="style.css">
   
</head>
<body class="basic-page">

    <div class="header">
        <h1>🏆 왕기초 도전 (20문제)</h1>
        <p class="info">정답을 빈칸에 쓰고 아래 <b>[정답 확인하기]</b>를 눌러요!</p>
    </div>

    <div id="scoreBoard" class="score-board">
        <div class="score-text" id="scoreValue">결과: 0점 / 100점</div>
        <p id="scoreMsg" style="margin-top: 5px; color: #666;"></p>
    </div>

    <div class="quiz-wrapper">
        <div class="card">
            <h3>연습문제 (A)</h3>
            <ul id="list-1"></ul>
        </div>
        <div class="card">
            <h3>연습문제 (B)</h3>
            <ul id="list-2"></ul>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-check" id="checkBtn" onclick="gradeQuiz()">✅ 정답 확인하기</button>
        <button onclick="resetAndNew()">🔄 새로운 문제 만들기</button>
        <a href="index.html" class="btn-home">🏠 메인 화면으로 돌아가기</a>
    </div>

<script>
    let currentQuizzes = [];

    function getBasicPlusQuizzes(count) {
        const data = [];
        while (data.length < count) {
            const n1 = Math.floor(Math.random() * 9) + 1;
            const n2 = Math.floor(Math.random() * 9) + 1;
            if (n1 + n2 >= 10) {
                const q = n1 + " + " + n2;
                if (!data.some(i => i.q === q)) data.push({ q, a: n1 + n2 });
            }
        }
        return data;
    }
// 1. 모든 입력창(ans-input)에 대해 제어 로직 적용
function applyInputControl() {
    const inputs = document.querySelectorAll('.ans-input');
    
    inputs.forEach(input => {
        // [A] 키보드 입력 시점에 차단 (마이너스, 소수점, 지수 기호)
        input.addEventListener('keydown', (e) => {
            if (e.key === '-' || e.key === '.' || e.key === 'e' || e.key === 'E') {
                e.preventDefault(); // 입력 자체를 못 하게 막음
            }
            
            // 엔터 키를 누르면 다음 칸으로 이동하거나 채점 실행 (편의 기능)
            if (e.key === 'Enter') {
                e.preventDefault();
                const nextInput = input.parentElement.nextElementSibling?.querySelector('.ans-input');
                if (nextInput) {
                    nextInput.focus();
                } else {
                    gradeQuiz(); // 마지막 칸이면 바로 채점
                }
            }
        });

        // [B] 붙여넣기나 마우스 조작으로 들어오는 음수/기호 즉시 삭제
        input.addEventListener('input', function() {
            // 숫자가 아니거나 음수면 빈칸으로 만듦
            if (this.value < 0) {
                this.value = this.value.replace(/-/g, ''); 
            }
        });
    });
}
    function renderQuizzes() {
        const q1 = getBasicPlusQuizzes(10);
        const q2 = getBasicPlusQuizzes(10);
        currentQuizzes = [...q1, ...q2];

        const renderItem = (item, idx, offset) => `
            <li class="quiz-item">
                <span class="q-text"><span class="q-num">(${idx + 1 + offset})</span> ${item.q} =</span> 
                <input type="number" class="ans-input" data-ans="${item.a}" inputmode="numeric">
                <span class="result-mark"></span>
            </li>
        `;

        document.getElementById('list-1').innerHTML = q1.map((item, idx) => renderItem(item, idx, 0)).join('');
        document.getElementById('list-2').innerHTML = q2.map((item, idx) => renderItem(item, idx, 10)).join('');

        // [중요] 문제 생성 후 입력 제어 함수 호출
        applyInputControl();
    }

    function gradeQuiz() {
        const inputs = document.querySelectorAll('.ans-input');
        const marks = document.querySelectorAll('.result-mark');
        let score = 0;

        inputs.forEach((input, i) => {
            const userVal = parseInt(input.value);
            const correctVal = parseInt(input.dataset.ans);
            
            if (userVal === correctVal) {
                score += 5; // 20문제이므로 문제당 5점
                marks[i].innerText = "⭕";
                marks[i].className = "result-mark correct-text";
                input.classList.remove('wrong-input');
            } else {
                marks[i].innerText = "❌";
                marks[i].className = "result-mark wrong-text";
                input.classList.add('wrong-input');
            }
        });

        // 점수판 표시
        const board = document.getElementById('scoreBoard');
        const scoreVal = document.getElementById('scoreValue');
        const scoreMsg = document.getElementById('scoreMsg');
        
        board.style.display = "block";
        scoreVal.innerText = `결과: ${score}점 / 100점`;
        
        if (score === 100) scoreMsg.innerText = "🎊 우와! 완벽해요! 백점입니다! 🎊";
        else if (score >= 80) scoreMsg.innerText = "👍 대단해요! 조금만 더 하면 백점이에요!";
        else scoreMsg.innerText = "💪 포기하지 마세요! 다시 한번 도전해볼까요?";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetAndNew() {
        document.getElementById('scoreBoard').style.display = "none";
        renderQuizzes();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 초기 실행
    renderQuizzes();
</script>

</body>
</html>
