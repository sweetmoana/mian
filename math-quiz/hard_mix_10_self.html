<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고난도 혼합 도전!</title>
    <link rel="stylesheet" href="style.css">

</head>
<body class="mix-hard-page">

    <div class="header">
        <h1>🔥 실력 완성: 고난도 혼합 (10문제)</h1>
        <p class="info">두 자리 수 연산이에요! 기호를 잘 보고 답을 써보세요.</p>
    </div>

    <div id="scoreBoard" class="score-board">
        <div class="score-text" id="scoreValue">결과: 0점 / 100점</div>
        <p id="scoreMsg" style="margin-top: 5px; color: #666;"></p>
    </div>

    <div class="quiz-wrapper">
        <div class="card">
            <ul id="quiz-list"></ul>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-check" id="checkBtn" onclick="gradeQuiz()">✅ 정답 확인하기</button>
        <button onclick="resetAndNew()">🔄 새로운 문제 만들기</button>
        <a href="index.html" class="btn-home">🏠 메인 화면으로 돌아가기</a>
    </div>

<script>
    function getHardMixedQuizzes(count) {
        const data = [];
        while (data.length < count) {
            const isPlus = Math.random() < 0.5;
            const n1 = Math.floor(Math.random() * 90) + 10; // 10 ~ 99
            const n2 = Math.floor(Math.random() * 9) + 1;  // 1 ~ 9

            if (isPlus) {
                // 받아올림 조건: 일의 자리 합이 10 이상
                if ((n1 % 10) + n2 >= 10) {
                    const q = `${n1} + ${n2}`;
                    if (!data.some(i => i.q === q)) data.push({ q, a: n1 + n2 });
                }
            } else {
                // 받아내림 조건: 일의 자리 < 빼는 수
                if ((n1 % 10) < n2) {
                    const q = `${n1} - ${n2}`;
                    if (!data.some(i => i.q === q)) data.push({ q, a: n1 - n2 });
                }
            }
        }
        return data;
    }

    function renderQuizzes() {
        const quizData = getHardMixedQuizzes(10);
        const quizList = document.getElementById('quiz-list');

        quizList.innerHTML = quizData.map((item, idx) => `
            <li class="quiz-item">
                <span class="q-text"><span class="q-num">(${idx + 1})</span> ${item.q} =</span> 
                <input type="number" class="ans-input" data-ans="${item.a}" inputmode="numeric" min="0">
                <span class="result-mark"></span>
            </li>
        `).join('');
        
        applyInputControl();
    }

    function applyInputControl() {
        const inputs = document.querySelectorAll('.ans-input');
        inputs.forEach(input => {
            input.addEventListener('keydown', (e) => {
                // 음수, 소수점, 지수 기호 차단
                if (['-', '.', 'e', 'E'].includes(e.key)) e.preventDefault();
                
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const allInputs = Array.from(document.querySelectorAll('.ans-input'));
                    const nextIdx = allInputs.indexOf(input) + 1;
                    if (allInputs[nextIdx]) allInputs[nextIdx].focus();
                    else gradeQuiz();
                }
            });
            input.addEventListener('input', function() {
                if (this.value < 0) this.value = "";
            });
        });
    }

    function gradeQuiz() {
        const inputs = document.querySelectorAll('.ans-input');
        const marks = document.querySelectorAll('.result-mark');
        let score = 0;

        inputs.forEach((input, i) => {
            const userVal = parseInt(input.value);
            const correctVal = parseInt(input.dataset.ans);
            
            if (userVal === correctVal) {
                score += 10;
                marks[i].innerText = "⭕";
                marks[i].className = "result-mark correct-text";
                input.classList.remove('wrong-input');
            } else {
                marks[i].innerText = "❌";
                marks[i].className = "result-mark wrong-text";
                input.classList.add('wrong-input');
            }
        });

        const board = document.getElementById('scoreBoard');
        board.style.display = "block";
        document.getElementById('scoreValue').innerText = `결과: ${score}점 / 100점`;
        
        const msg = document.getElementById('scoreMsg');
        if (score === 100) msg.innerText = "🏆 완벽해요! 연산의 신이 나타났습니다! 🏆";
        else if (score >= 70) msg.innerText = "👏 훌륭합니다! 실수만 조금 줄이면 만점이에요!";
        else msg.innerText = "💪 포기하지 마세요! 다시 풀면 다 맞을 수 있어요.";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetAndNew() {
        document.getElementById('scoreBoard').style.display = "none";
        renderQuizzes();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuizzes();
</script>
</body>
</html>
