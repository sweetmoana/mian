<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡️ 기초 혼합 (10문제)</title>
    <link rel="stylesheet" href="style.css">

</head>
<body class="mix-easy-page">

    <div class="header">
        <h1>⚡️ 기초 혼합 (10문제)</h1>
        <p class="info">기호를 잘 보고 풀어보세요!<br>회색 칸을 누르면 정답이 보입니다.</p>
    </div>
    <div class="quiz-wrapper">
        <div class="card">
            <ul id="quiz-list"></ul>
        </div>
    </div>
    <div class="btn-container">
        <button class="btn-refresh" onclick="allNewQuizzes()">🔄 새로운 문제 만들기</button>
	<a href="index.html" class="btn-home">🏠 메인 화면으로 돌아가기</a>
    </div>

<script>
    function showAnswer(element) {
        element.classList.add('show');
    }

    function allNewQuizzes() {
        const quizList = document.getElementById('quiz-list');
        const data = [];

        while (data.length < 10) {
            // 0이면 덧셈, 1이면 뺄셈 무작위 결정
            const isPlus = Math.random() < 0.5;
            const n1 = Math.floor(Math.random() * 10) + 10; // 10 ~ 19
            const n2 = Math.floor(Math.random() * 9) + 1;  // 1 ~ 9

            if (isPlus) {
                // 받아올림 조건 확인
                if ((n1 % 10) + n2 >= 10) {
                    const q = `${n1} + ${n2}`;
                    if (!data.some(i => i.q === q)) data.push({ q, a: n1 + n2 });
                }
            } else {
                // 받아내림 조건 확인
                if ((n1 % 10) < n2) {
                    const q = `${n1} - ${n2}`;
                    if (!data.some(i => i.q === q)) data.push({ q, a: n1 - n2 });
                }
            }
        }

        // 화면에 그리기
        quizList.innerHTML = data.map((item, idx) => `
            <li>
                <span class="q-text"><span class="q-num">(${idx + 1})</span> 
            ${item.q} =</span> 
                <div class="ans-box" onclick="showAnswer(this)">${item.a}</div>
            </li>
        `).join('');

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 처음 실행
    allNewQuizzes();
</script>

</body>
</html>
