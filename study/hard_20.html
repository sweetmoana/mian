<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="quizicon.png">
<meta name="theme-color" content="#f08c00">
    <title>반응형 연산 퀴즈</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="hard-page">

    <div class="header">
        <h1>🌳 실력 쑥쑥 (20문제)</h1>
        <p class="info">문제를 풀고 <b>회색 칸</b>을 누르면 정답이 나와요!</p>
    </div>

    <div class="quiz-wrapper">
        <div class="card plus">
            <h3>➕ 덧셈 (받아올림)</h3>
            <ul id="plus-list"></ul>
        </div>

        <div class="card minus">
            <h3>➖ 뺄셈 (받아내림)</h3>
            <ul id="minus-list"></ul>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-refresh" onclick="generateAdvancedQuizzes()">🔄 새로운 문제 만들기</button>
	<a href="index.html" class="btn-home">🏠 메인 화면으로 돌아가기</a>
    </div>

<script>
    function showAnswer(element) {
        element.classList.add('show');
    }

    // 덧셈 로직 (일의자리 합 >= 10)
    function getPlusQuizzes(count) {
        const data = [];
        while (data.length < count) {
            const n1 = Math.floor(Math.random() * 90) + 10;
            const n2 = Math.floor(Math.random() * 9) + 1;
            if ((n1 % 10) + n2 >= 10) {
                const q = `${n1} + ${n2}`;
                if (!data.some(i => i.q === q)) data.push({ q, a: n1 + n2 });
            }
        }
        return data;
    }

    // 뺄셈 로직 (일의자리 < 빼는 수)
    function getMinusQuizzes(count) {
        const data = [];
        while (data.length < count) {
            const n1 = Math.floor(Math.random() * 89) + 10;
            const n2 = Math.floor(Math.random() * 9) + 1;
            if ((n1 % 10) < n2) {
                const q = `${n1} - ${n2}`;
                if (!data.some(i => i.q === q)) data.push({ q, a: n1 - n2 });
            }
        }
        return data;
    }

    function allNewQuizzes() {
        const plusList = document.getElementById('plus-list');
        plusList.innerHTML = getPlusQuizzes(10).map((item, idx) => `
            <li>
                <span class="q-text"><span class="q-num">(${idx + 1})</span> 
            ${item.q} =</span> 
                <div class="ans-box" onclick="showAnswer(this)">${item.a}</div>
            </li>
        `).join('');

        const minusList = document.getElementById('minus-list');
        minusList.innerHTML = getMinusQuizzes(10).map((item, idx) => `
            <li>
                <span class="q-text"><span class="q-num">(${idx + 1})</span> 
            ${item.q} =</span> 
                <div class="ans-box" onclick="showAnswer(this)">${item.a}</div>
            </li>
        `).join('');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    allNewQuizzes();
</script>

</body>
</html>
