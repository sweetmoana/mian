<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="quizicon.png">
<meta name="theme-color" content="#f08c00">
    <title>🌱 기초 탄탄 (20문제)</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="easy-page">

    <div class="header">
        <h1>🌱 기초 탄탄 (20문제)</h1>
        <p class="info">십몇 ± 한자리 연습! 회색 칸을 누르면 정답 확인</p>
    </div>

    <div class="quiz-wrapper">
        <div class="card plus">
            <h3>➕ 덧셈 (받아올림)</h3>
            <ul id="plus-list"></ul>
        </div>

        <div class="card minus">
            <h3>➖ 뺄셈 (받아내림)</h3>
            <ul id="minus-list"></ul>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-refresh" onclick="allNewQuizzes()">🔄 새로운 문제 만들기</button>
	<a href="index.html" class="btn-home">🏠 메인 화면으로 돌아가기</a>
    </div>

<script>
    function showAnswer(element) {
        element.classList.add('show');
    }

    // 10~19 사이의 숫자만 생성하도록 변경
    function getPlusQuizzes(count) {
        const data = [];
        while (data.length < count) {
            const n1 = Math.floor(Math.random() * 10) + 10; // 10 ~ 19
            const n2 = Math.floor(Math.random() * 9) + 1;  // 1 ~ 9
            if ((n1 % 10) + n2 >= 10) {
                const q = `${n1} + ${n2}`;
                if (!data.some(i => i.q === q)) data.push({ q, a: n1 + n2 });
            }
        }
        return data;
    }

    function getMinusQuizzes(count) {
        const data = [];
        while (data.length < count) {
            const n1 = Math.floor(Math.random() * 10) + 10; // 10 ~ 19
            const n2 = Math.floor(Math.random() * 9) + 1;  // 1 ~ 9
            if ((n1 % 10) < n2) {
                const q = `${n1} - ${n2}`;
                if (!data.some(i => i.q === q)) data.push({ q, a: n1 - n2 });
            }
        }
        return data;
    }

    function allNewQuizzes() {
        document.getElementById('plus-list').innerHTML = getPlusQuizzes(10).map((item, idx) => `
            <li><span class="q-text"><span class="q-num">(${idx + 1})</span> 
            ${item.q} =</span>  <div class="ans-box" onclick="showAnswer(this)">${item.a}</div></li>
        `).join('');

        document.getElementById('minus-list').innerHTML = getMinusQuizzes(10).map((item, idx) => `
            <li><span class="q-text"><span class="q-num">(${idx + 1})</span> 
            ${item.q} =</span> <div class="ans-box" onclick="showAnswer(this)">${item.a}</div></li>
        `).join('');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    allNewQuizzes();
</script>

</body>
</html>
